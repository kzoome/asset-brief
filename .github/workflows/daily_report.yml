name: Daily AssetBrief

on:
  schedule:
    # лІ§мЭЉ нХЬкµ≠ мЛЬк∞Д мШ§м†Д 08:13 (UTC 23:13 prev day) - мХДмє® лЄМл¶ђнХС
    - cron: '13 23 * * *'
    # лІ§мЭЉ нХЬкµ≠ мЛЬк∞Д мШ§нЫД 18:13 (UTC 09:13) - м†АлЕБ лЄМл¶ђнХС
    - cron: '13 9 * * *'
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to report (us/kr/all)'
        required: true
        default: 'all'

jobs:
  morning-briefing:
    name: рЯМЕ мХДмє® мЛЬмЮ• лЄМл¶ђнХС (KST 08:13)
    runs-on: ubuntu-latest
    # мК§мЉАм§Д: Morning cronмЭЉ лХМлІМ / мИШлПЩ: marketмЭі us лШРлКФ allмЭЉ лХМлІМ
    if: >-
      github.event.schedule == '13 23 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.market == 'us' || github.event.inputs.market == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Global Briefing (Morning)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --market all

  evening-briefing:
    name: рЯМЗ м†АлЕБ мЛЬмЮ• лЄМл¶ђнХС (KST 18:13)
    runs-on: ubuntu-latest
    # мК§мЉАм§Д: Evening cronмЭЉ лХМлІМ / мИШлПЩ: marketмЭі kr лШРлКФ allмЭЉ лХМлІМ
    if: >-
      github.event.schedule == '13 9 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.market == 'kr' || github.event.inputs.market == 'all'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Global Briefing (KR Post-Market)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --market all