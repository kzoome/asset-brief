name: Daily AssetBrief

on:
  schedule:
    # 매일 한국 시간 오전 08:13 (UTC 23:13 prev day) - 아침 브리핑
    - cron: '13 23 * * *'
    # 매일 한국 시간 오후 18:13 (UTC 09:13) - 저녁 브리핑
    - cron: '13 9 * * *'
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to report (us/kr/all)'
        required: true
        default: 'all'

jobs:
  morning-briefing:
    name: 🌅 아침 시장 브리핑 (KST 08:13)
    runs-on: ubuntu-latest
    if: github.event.schedule == '13 23 * * *'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Global Briefing (Morning)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python main.py --market all

  evening-briefing:
    name: 🌇 저녁 시장 브리핑 (KST 18:13)
    runs-on: ubuntu-latest
    if: github.event.schedule == '13 9 * * *'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Global Briefing (Evening)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python main.py --market all

  manual-briefing:
    name: 🚀 수동 실행 브리핑 (Market:${{ github.event.inputs.market }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Global Briefing (Manual)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python main.py --market ${{ github.event.inputs.market }}