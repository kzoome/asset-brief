name: Daily AssetBrief

on:
  schedule:
    # 🇺🇸 미국 주식: KST 09:00 = UTC 00:00 (전일 미국 시장 마감 후 뉴스 정리)
    - cron: '0 0 * * 2-6'   # 월~금 (한국 화~토 오전 9시)
    # 🇰🇷 한국 주식: KST 16:00 = UTC 07:00 (당일 한국 시장 마감 직후)
    - cron: '0 7 * * 1-5'   # 월~금 (한국 월~금 오후 4시)
  workflow_dispatch:
    inputs:
      market:
        description: '실행할 시장 (us / kr / all)'
        required: false
        default: 'all'

jobs:
  us-briefing:
    name: 🇺🇸 미국 주식 브리핑 (KST 09:00)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 2-6'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run US Briefing
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MARKET=${{ github.event.inputs.market || 'us' }}
          python main.py --market $MARKET

  kr-briefing:
    name: 🇰🇷 한국 주식 브리핑 (KST 16:00)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 7 * * 1-5'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KR Briefing
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MARKET=${{ github.event.inputs.market || 'kr' }}
          python main.py --market $MARKET