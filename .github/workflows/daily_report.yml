name: Daily AssetBrief

on:
  schedule:
    # 매일 한국 시간 오전 07:33 (UTC 22:33 prev day) - 아침 브리핑
    - cron: '33 22 * * *'
    # 매일 한국 시간 오후 17:33 (UTC 08:33) - 저녁 브리핑
    - cron: '33 8 * * *'
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to report (us/kr/all)'
        required: true
        default: 'all'

jobs:
  asset-briefing:
    name: 📈 AssetBrief 데일리 리포트 실행
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > /tmp/service_account.json

      - name: Run Global Briefing
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_FILE: /tmp/service_account.json
        run: python main.py --market ${{ github.event.inputs.market || 'all' }}